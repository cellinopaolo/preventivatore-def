<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Preventivatore iOS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --ios-bg: #F2F2F7;
            --ios-blue: #007AFF;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--ios-bg);
            color: #000;
            -webkit-font-smoothing: antialiased;
        }

        /* Effetto sfocatura tipico di Apple */
        .apple-blur {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 0.5px solid rgba(255, 255, 255, 0.3);
        }

        /* Card sollevate con ombre morbidissime */
        .ios-card {
            background: #FFFFFF;
            border-radius: 24px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04);
        }

        /* Input che sembrano parte del sistema */
        input, select {
            background: #E3E3E8 !important; /* Grigio sistema iOS */
            border: none !important;
            border-radius: 12px !important;
            padding: 14px !important;
            font-size: 17px !important;
            font-weight: 500 !important;
            color: #000 !important;
            outline: none !important;
        }

        /* Animazione al tocco */
        .ios-press {
            transition: transform 0.15s ease, opacity 0.15s ease;
        }
        .ios-press:active {
            transform: scale(0.96);
            opacity: 0.8;
        }

        /* Tab bar inferiore stile iPhone */
        .tab-bar {
            background: rgba(249, 249, 249, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 0.3px solid rgba(0,0,0,0.15);
        }

        h1 { letter-spacing: -0.04em; }
    </style>
</head>
<body class="pb-32">

    <header class="sticky top-0 z-50 px-6 py-4 flex items-center justify-between apple-blur">
        <button id="back-btn" class="ios-press hidden flex items-center text-[#007AFF] font-medium">
            <i data-lucide="chevron-left" class="w-6 h-6 mr-1"></i> Indietro
        </button>
        <span class="flex-1 text-center font-semibold text-lg" id="nav-title">App</span>
        <div class="w-20"></div> </header>

    <main id="content" class="p-6 max-w-lg mx-auto"></main>

    <nav class="fixed bottom-0 left-0 right-0 z-50 tab-bar px-8 pt-3 pb-8 flex justify-around items-center">
        <button onclick="renderCategorie()" class="ios-press flex flex-col items-center">
            <i data-lucide="layout" class="w-6 h-6 text-[#007AFF]"></i>
            <span class="text-[11px] font-medium mt-1 text-[#007AFF]">Libreria</span>
        </button>
        <button onclick="renderGestionale()" class="ios-press flex flex-col items-center opacity-40">
            <i data-lucide="folder-kanban" class="w-6 h-6 text-black"></i>
            <span class="text-[11px] font-medium mt-1 text-black">Listini</span>
        </button>
    </nav>

    <script src="app.js"></script>
</body>
</html>
