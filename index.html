<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Preventivatore PWA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="manifest" href="manifest.json">
    <style>
        body { -webkit-tap-highlight-color: transparent; overscroll-behavior-y: contain; }
        .bg-stone-500 { background-color: #78716c; }
        .bg-orange-600 { background-color: #ea580c; }
        .bg-amber-800 { background-color: #92400e; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">

    <div id="app" class="max-w-md mx-auto min-h-screen pb-20">
        <header class="bg-white p-6 shadow-sm sticky top-0 z-10 flex justify-between items-center">
            <h1 class="text-xl font-black tracking-tighter">PREVENTIVI PRO</h1>
            <div id="back-btn" class="hidden text-blue-600 font-bold cursor-pointer">← Indietro</div>
        </header>

        <main id="content" class="p-4">
            </main>

        <nav class="fixed bottom-0 left-0 right-0 bg-white border-t p-4 flex justify-around max-w-md mx-auto">
            <div class="flex flex-col items-center text-blue-600">
                <i data-lucide="plus-circle"></i>
                <span class="text-[10px] font-bold uppercase mt-1">Nuovo</span>
            </div>
            <div class="flex flex-col items-center text-slate-400">
                <i data-lucide="history"></i>
                <span class="text-[10px] font-bold uppercase mt-1">Archivio</span>
            </div>
        </nav>
    </div>

    <script src="app.js"></script>
</body>
</html>
