<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Preventivatore iOS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --ios-bg: #F2F2F7;
            --ios-card: #FFFFFF;
            --ios-blue: #007AFF;
            --ios-sep: #C6C6C8;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --ios-bg: #000000;
                --ios-card: #1C1C1E;
                --ios-sep: #38383A;
            }
            body { color: white; }
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--ios-bg);
            -webkit-font-smoothing: antialiased;
        }

        /* Grouped Table Style */
        .ios-group {
            background: var(--ios-card);
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .ios-row {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 0.5px solid var(--ios-sep);
        }

        .ios-row:last-child { border-bottom: none; }

        .ios-label {
            font-size: 15px;
            font-weight: 400;
            width: 40%;
            color: inherit;
        }

        /* Input Invisibili stile iOS */
        input, select {
            background: transparent !important;
            border: none !important;
            outline: none !important;
            font-size: 17px !important;
            color: var(--ios-blue) !important;
            width: 60%;
            text-align: right;
            appearance: none;
            -webkit-appearance: none;
        }

        input::placeholder { color: #AEAEB2; }

        /* Button Apple Blue */
        .btn-primary {
            background-color: var(--ios-blue);
            color: white;
            border-radius: 12px;
            padding: 16px;
            font-weight: 600;
            font-size: 17px;
            width: 100%;
            margin-top: 10px;
            transition: opacity 0.2s;
        }

        .btn-primary:active { opacity: 0.7; }

        /* Navigation */
        .nav-header {
            position: sticky;
            top: 0;
            z-index: 50;
            padding: 40px 20px 10px 20px;
            background: var(--ios-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .large-title {
            font-size: 34px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .tab-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(249, 249, 249, 0.9);
            backdrop-filter: blur(20px);
            border-top: 0.5px solid var(--ios-sep);
            display: flex;
            justify-content: space-around;
            padding: 10px 0 30px 0;
        }
    </style>
</head>
<body class="pb-40">

    <div id="app">
        <header class="nav-header">
            <div id="header-top" class="flex justify-between items-center mb-2">
                <button id="back-btn" class="text-[#007AFF] hidden flex items-center font-medium">
                    <i data-lucide="chevron-left" class="w-6 h-6"></i> Indietro
                </button>
            </div>
            <h1 class="large-title" id="page-title">Catalogo</h1>
        </header>

        <main id="content" class="px-4 mt-2 max-w-lg mx-auto"></main>
    </div>

    <nav class="tab-bar">
        <button onclick="renderCategorie()" class="flex flex-col items-center">
            <i data-lucide="grid" class="w-6 h-6 text-[#007AFF]"></i>
            <span class="text-[10px] mt-1 text-[#007AFF]">Catalogo</span>
        </button>
        <button onclick="renderGestionale()" class="flex flex-col items-center opacity-40">
            <i data-lucide="settings" class="w-6 h-6"></i>
            <span class="text-[10px] mt-1">Impostazioni</span>
        </button>
    </nav>

    <script src="app.js"></script>
</body>
</html>
