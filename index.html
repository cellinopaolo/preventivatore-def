<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Preventivi B&B</title>
    
    <link rel="apple-touch-icon" href="icona-512.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icona-512.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icona-512.png">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Preventivi B&B">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --ios-bg: #F2F2F7;
            --ios-card: #FFFFFF;
            --ios-blue: #007AFF;
            --ios-sep: #C6C6C8;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--ios-bg);
            color: #000000;
            -webkit-font-smoothing: antialiased;
            margin: 0;
            padding: 0;
        }

        /* Grouped Table Style (iOS Settings Look) */
        .ios-group {
            background: var(--ios-card);
            border-radius: 12px;
            margin: 0 16px 24px 16px;
            overflow: hidden;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .ios-row {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            min-height: 44px;
            border-bottom: 0.5px solid var(--ios-sep);
        }

        .ios-row:last-child { border-bottom: none; }

        .ios-label {
            font-size: 16px;
            font-weight: 400;
            flex: 1;
        }

        /* Input & Select Apple Style */
        input, select {
            background: transparent !important;
            border: none !important;
            outline: none !important;
            font-size: 16px !important;
            color: #8E8E93 !important;
            text-align: right;
            padding: 0 !important;
            width: auto;
            max-width: 180px;
            appearance: none;
            -webkit-appearance: none;
        }

        input:focus, select:focus {
            color: var(--ios-blue) !important;
        }

        /* iOS 17 Large Titles */
        .nav-header {
            position: sticky;
            top: 0;
            z-index: 50;
            padding: 60px 20px 10px 20px;
            background: rgba(242, 242, 247, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .large-title {
            font-size: 34px;
            font-weight: 800;
            letter-spacing: -1px;
            margin-left: -2px;
        }

        /* Buttons */
        .btn-primary {
            background-color: var(--ios-blue);
            color: white;
            border-radius: 14px;
            padding: 16px;
            font-weight: 600;
            font-size: 17px;
            width: calc(100% - 32px);
            margin: 10px 16px;
            transition: transform 0.1s;
            box-shadow: 0 4px 12px rgba(0, 122, 255, 0.3);
        }

        .btn-primary:active { transform: scale(0.96); opacity: 0.9; }

        /* Bottom Tab Bar */
        .tab-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(249, 249, 249, 0.94);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 0.5px solid var(--ios-sep);
            display: flex;
            justify-content: space-around;
            padding: 10px 0 34px 0; /* Padding extra per Home Indicator iOS */
        }
    </style>
</head>
<body class="pb-32">

    <header class="nav-header">
        <div class="flex items-center h-8 mb-1">
            <button id="back-btn" class="text-[#007AFF] hidden flex items-center font-normal text-[17px]">
                <i data-lucide="chevron-left" class="w-6 h-6 -ml-1"></i> Indietro
            </button>
        </div>
        <h1 class="large-title" id="page-title">Preventivi B&B</h1>
    </header>

    <main id="content" class="mt-2 max-w-lg mx-auto"></main>

    <nav class="tab-bar">
        <button onclick="renderCategorie()" class="flex flex-col items-center group">
            <i data-lucide="layout-grid" id="icon-cat" class="w-6 h-6 text-[#007AFF]"></i>
            <span class="text-[10px] mt-1 font-medium text-[#007AFF]">Libreria</span>
        </button>
        <button onclick="renderGestionale()" class="flex flex-col items-center opacity-40">
            <i data-lucide="settings" id="icon-set" class="w-6 h-6"></i>
            <span class="text-[10px] mt-1 font-medium">Listini</span>
        </button>
    </nav>

    <script src="app.js"></script>
</body>
</html>
