<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Preventivatore Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; overscroll-behavior-y: contain; }
        .safe-pb { padding-bottom: env(safe-area-inset-bottom); }
        input[type="number"]::-webkit-inner-spin-button { display: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans select-none">
    <div id="app" class="max-w-md mx-auto min-h-screen flex flex-col">
        <header class="bg-white/80 backdrop-blur-md sticky top-0 z-30 p-4 border-b flex justify-between items-center">
            <h1 class="text-lg font-black tracking-tighter">PREVENTIVI <span class="text-blue-600">PRO</span></h1>
            <div id="back-btn" class="hidden p-2 bg-slate-100 rounded-full cursor-pointer"><i data-lucide="chevron-left"></i></div>
        </header>
        <main id="content" class="p-4 flex-grow pb-32"></main>
        <nav class="fixed bottom-0 left-0 right-0 bg-white border-t p-4 flex justify-around items-center max-w-md mx-auto z-40 safe-pb">
            <button onclick="renderCategorie()" class="flex flex-col items-center text-blue-600"><i data-lucide="layout-grid"></i><span class="text-[10px] font-bold uppercase mt-1">Catalogo</span></button>
            <button onclick="renderGestionale()" class="flex flex-col items-center text-slate-400"><i data-lucide="settings-2"></i><span class="text-[10px] font-bold uppercase mt-1">Listini</span></button>
        </nav>
    </div>
    <div id="modal" class="hidden fixed inset-0 bg-black/60 z-50 flex items-end sm:items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl animate-in slide-in-from-bottom duration-300">
            <div id="modal-content"></div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
